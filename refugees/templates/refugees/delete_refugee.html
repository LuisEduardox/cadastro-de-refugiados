{% extends "base.html" %}

{% block page_title %}
    Deletar Registro
{% endblock page_title %}

{% block content %}
    <h1>Deletar registro de refugiado</h1>
    <p>Tem certeza que deseja excluir <strong>{{refugee.name}}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Excluir</button>
        <a href="{% url 'registros' %}">Cancelar</a>
    </form>
{% endblock content %}
